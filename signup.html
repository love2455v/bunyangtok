<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - 분양톡</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; display: flex; background: #0f1117; }
    .auth-left { flex: 1; position: relative; display: none; background: url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1400&q=90') center/cover no-repeat; }
    @media (min-width: 960px) { .auth-left { display: block; } }
    .auth-left-overlay { position: absolute; inset: 0; background: linear-gradient(160deg, rgba(15,17,23,0.9) 0%, rgba(255,107,43,0.2) 100%); display: flex; flex-direction: column; justify-content: space-between; padding: 52px; }
    .left-logo { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.5px; display: flex; align-items: center; }
    .left-logo span { color: #FF6B2B; }
    .left-copy h2 { font-size: 36px; font-weight: 800; color: #fff; line-height: 1.3; letter-spacing: -1px; margin-bottom: 20px; }
    .benefit-list { list-style: none; }
    .benefit-list li { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.85); font-size: 15px; margin-bottom: 14px; }
    .benefit-icon { width: 36px; height: 36px; background: rgba(255,107,43,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .left-note { font-size: 13px; color: rgba(255,255,255,0.4); }
    .auth-right { width: 100%; max-width: 500px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 48px 44px; background: #fff; overflow-y: auto; }
    @media (max-width: 959px) { .auth-right { max-width: 100%; padding: 36px 24px; } }
    .logo-mobile { display: none; font-size: 24px; font-weight: 800; color: #1E1E1E; margin-bottom: 32px; align-items: center; }
    .logo-mobile span { color: #FF6B2B; }
    @media (max-width: 959px) { .logo-mobile { display: flex; } }
    .auth-title { font-size: 28px; font-weight: 800; color: #1E1E1E; letter-spacing: -0.8px; margin-bottom: 6px; }
    .auth-sub { font-size: 15px; color: #94A3B8; margin-bottom: 32px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 7px; }
    .required { color: #FF6B2B; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }
    .form-input { width: 100%; height: 50px; padding: 0 16px 0 44px; border: 1.5px solid #E2E8F0; border-radius: 12px; font-size: 15px; font-family: inherit; color: #1E1E1E; background: #F8FAFC; transition: all 0.2s; outline: none; }
    .form-input:focus { border-color: #FF6B2B; background: #fff; box-shadow: 0 0 0 3px rgba(255,107,43,0.1); }
    .form-input::placeholder { color: #CBD5E1; }
    .form-select { width: 100%; height: 50px; padding: 0 16px; border: 1.5px solid #E2E8F0; border-radius: 12px; font-size: 15px; font-family: inherit; color: #1E1E1E; background: #F8FAFC; transition: all 0.2s; outline: none; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2394A3B8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 16px center; }
    .form-select:focus { border-color: #FF6B2B; background-color: #fff; box-shadow: 0 0 0 3px rgba(255,107,43,0.1); }
    .pw-strength { margin-top: 8px; }
    .pw-bars { display: flex; gap: 4px; margin-bottom: 4px; }
    .pw-bar { flex: 1; height: 3px; border-radius: 2px; background: #E2E8F0; transition: background 0.3s; }
    .pw-bar.weak { background: #EF4444; }
    .pw-bar.fair { background: #F59E0B; }
    .pw-bar.good { background: #10B981; }
    .pw-hint { font-size: 11px; color: #94A3B8; }
    .agree-group { background: #F8FAFC; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
    .agree-all { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; color: #1E1E1E; cursor: pointer; padding-bottom: 12px; border-bottom: 1px solid #E2E8F0; margin-bottom: 12px; }
    .agree-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #64748B; cursor: pointer; margin-bottom: 8px; }
    .agree-item:last-child { margin-bottom: 0; }
    .agree-item input, .agree-all input { width: 16px; height: 16px; accent-color: #FF6B2B; cursor: pointer; flex-shrink: 0; }
    .agree-link { color: #FF6B2B; text-decoration: none; margin-left: auto; font-size: 12px; }
    .agree-link:hover { text-decoration: underline; }
    .btn-submit { width: 100%; height: 52px; background: linear-gradient(135deg, #FF6B2B 0%, #FF8C42 100%); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; letter-spacing: 0.3px; transition: all 0.2s; box-shadow: 0 4px 18px rgba(255,107,43,0.38); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(255,107,43,0.48); }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: #94A3B8; }
    .auth-footer a { color: #FF6B2B; font-weight: 700; text-decoration: none; }
    .back-home { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 14px; font-size: 13px; color: #CBD5E1; text-decoration: none; transition: color 0.2s; }
    .back-home:hover { color: #FF6B2B; }
    .error-msg { display: none; background: #FEF2F2; border: 1.5px solid #FECACA; color: #DC2626; border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; font-weight: 500; }
    .error-msg.show { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .btn-submit.loading .btn-text { display: none; }
    .btn-submit.loading .spinner { display: block; }
    .id-check-wrap { display: flex; gap: 8px; }
    .id-check-wrap .form-input { flex: 1; }
    .btn-check { flex-shrink: 0; height: 50px; padding: 0 16px; background: #1E1E1E; color: #fff; border: none; border-radius: 12px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    .btn-check:hover { background: #333; }
    .btn-check:disabled { opacity: 0.5; cursor: not-allowed; }
    .check-result { font-size: 12px; margin-top: 5px; font-weight: 600; min-height: 16px; }
    .success-msg { display: none; background: #F0FDF4; border: 1.5px solid #86EFAC; color: #16A34A; border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; font-weight: 500; }
    .success-msg.show { display: block; }
  </style>
</head>
<body>
<div class="auth-left">
  <div class="auth-left-overlay">
    <div class="left-logo"><img src="logo-icon.svg" width="32" height="32" alt="" style="border-radius:7px;margin-right:8px;">분양<span>톡</span></div>
    <div class="left-benefits">
      <div class="left-copy"><h2>분양 종사자를 위한<br/>최고의 플랫폼</h2></div>
      <ul class="benefit-list">
        <li><div class="benefit-icon">🔥</div><div>전국 신규 현장 실시간 알림 수신</div></li>
        <li><div class="benefit-icon">💰</div><div>팀수수료, 복리후생 상세 비교 가능</div></li>
        <li><div class="benefit-icon">📋</div><div>현장 직접 등록 및 상담사 모집</div></li>
        <li><div class="benefit-icon">🏆</div><div>베스트 현장 TOP10 우선 확인</div></li>
      </ul>
    </div>
    <div class="left-note">지금 바로 무료로 시작하세요</div>
  </div>
</div>
<div class="auth-right">
  <div class="logo-mobile"><img src="logo-icon.svg" width="28" height="28" alt="" style="border-radius:6px;margin-right:7px;">분양<span>톡</span></div>
  <h1 class="auth-title">함께 시작해볼까요? 🚀</h1>
  <p class="auth-sub">30초 만에 무료로 가입하고 현장 정보를 받아보세요</p>
  <form id="signupForm">
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">이름 <span class="required">*</span></label>
        <div class="input-wrap"><span class="input-icon">👤</span><input type="text" id="name" class="form-input" placeholder="홍길동" required /></div>
      </div>
      <div class="form-group">
        <label class="form-label">연락처</label>
        <div class="input-wrap"><span class="input-icon">📱</span><input type="tel" id="phone" class="form-input" placeholder="010-0000-0000" /></div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">별명 <span class="required">*</span></label>
      <div class="input-wrap"><span class="input-icon">😊</span><input type="text" id="nickname" class="form-input" placeholder="예) 홍팀장, 서울에이스 (10자 이내)" maxlength="10" required /></div>
      <div style="font-size:11px;color:#94A3B8;margin-top:5px;">상단바 및 프로필에 표시되는 이름입니다</div>
    </div>
    <div class="form-group">
      <label class="form-label">아이디 <span class="required">*</span></label>
      <div class="id-check-wrap">
        <div class="input-wrap" style="flex:1;position:relative;"><span class="input-icon">👤</span><input type="text" id="userId" class="form-input" placeholder="영문·숫자 4~20자" required minlength="4" maxlength="20" autocomplete="username" oninput="resetCheck()" /></div>
        <button type="button" class="btn-check" id="checkBtn" onclick="checkUserId()">중복확인</button>
      </div>
      <div class="check-result" id="checkResult"></div>
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호 <span class="required">*</span></label>
      <div class="input-wrap"><span class="input-icon">🔒</span><input type="password" id="password" class="form-input" placeholder="8자 이상 입력" required minlength="8" oninput="checkPwStrength(this.value)" /></div>
      <div class="pw-strength">
        <div class="pw-bars"><div class="pw-bar" id="bar1"></div><div class="pw-bar" id="bar2"></div><div class="pw-bar" id="bar3"></div><div class="pw-bar" id="bar4"></div></div>
        <div class="pw-hint" id="pwHint">8자 이상 입력해주세요</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호 확인 <span class="required">*</span></label>
      <div class="input-wrap"><span class="input-icon">🔑</span><input type="password" id="passwordConfirm" class="form-input" placeholder="비밀번호를 한번 더 입력하세요" required /></div>
    </div>
    <div class="agree-group">
      <label class="agree-all"><input type="checkbox" id="agreeAll" onchange="toggleAll(this)" />전체 약관에 동의합니다</label>
      <label class="agree-item"><input type="checkbox" id="agreeTerms" class="agree-check" onchange="syncAll()" required /><span>[필수] 이용약관에 동의합니다</span><a href="terms.html" class="agree-link">보기</a></label>
      <label class="agree-item"><input type="checkbox" id="agreePrivacy" class="agree-check" onchange="syncAll()" required /><span>[필수] 개인정보 처리방침에 동의합니다</span><a href="privacy.html" class="agree-link">보기</a></label>
      <label class="agree-item"><input type="checkbox" id="agreeMarketing" class="agree-check" onchange="syncAll()" /><span>[선택] 마케팅 정보 수신에 동의합니다</span></label>
    </div>
    <button type="submit" id="submitBtn" class="btn-submit"><span class="btn-text">무료로 시작하기</span><div class="spinner"></div></button>
  </form>
  <div class="auth-footer">이미 회원이신가요? <a href="login.html">로그인</a></div>
  <a href="index.html" class="back-home">← 메인으로 돌아가기</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
<script>
function toggleAll(el) { document.querySelectorAll('.agree-check').forEach(c => c.checked = el.checked); }
function syncAll() { const checks = document.querySelectorAll('.agree-check'); document.getElementById('agreeAll').checked = Array.from(checks).every(c => c.checked); }
function checkPwStrength(pw) {
  const bars = ['bar1','bar2','bar3','bar4']; const hint = document.getElementById('pwHint'); let score = 0;
  if (pw.length >= 8) score++; if (/[A-Z]/.test(pw) || /[a-z]/.test(pw)) score++; if (/[0-9]/.test(pw)) score++; if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [['','','',''],['weak','','',''],['weak','fair','',''],['fair','fair','good',''],['good','good','good','good']];
  const hints = ['8자 이상 입력해주세요','약한 비밀번호','보통 비밀번호','강한 비밀번호','매우 강한 비밀번호'];
  bars.forEach((id, i) => { document.getElementById(id).className = 'pw-bar ' + (levels[score][i] || ''); });
  hint.textContent = hints[score] || hints[0];
}

let idChecked = false;

function resetCheck() {
  idChecked = false;
  const r = document.getElementById('checkResult');
  r.textContent = ''; r.style.color = '';
}

async function checkUserId() {
  const userId = document.getElementById('userId').value.trim();
  const btn = document.getElementById('checkBtn');
  const result = document.getElementById('checkResult');

  if (!/^[a-zA-Z0-9_]{4,20}$/.test(userId)) {
    result.textContent = '영문·숫자·밑줄(_)만 사용 가능, 4~20자';
    result.style.color = '#EF4444'; idChecked = false; return;
  }

  btn.textContent = '확인 중...'; btn.disabled = true;

  try {
    const db = getSupabase();
    // profiles 테이블에서 username 중복 확인
    const { data, error } = await db.from('profiles').select('id').eq('username', userId).maybeSingle();
    if (data) {
      result.textContent = '✗ 이미 사용 중인 아이디입니다';
      result.style.color = '#EF4444'; idChecked = false;
    } else {
      result.textContent = '✓ 사용 가능한 아이디입니다';
      result.style.color = '#10B981'; idChecked = true;
    }
  } catch (err) {
    // profiles 테이블 없을 경우 통과
    result.textContent = '✓ 사용 가능한 아이디입니다';
    result.style.color = '#10B981'; idChecked = true;
  }

  btn.textContent = '중복확인'; btn.disabled = false;
}

document.getElementById('signupForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const userId = document.getElementById('userId').value.trim();
  const password = document.getElementById('password').value;
  const passwordConfirm = document.getElementById('passwordConfirm').value;
  const name = document.getElementById('name').value.trim();
  const nickname = document.getElementById('nickname').value.trim();
  const errEl = document.getElementById('errorMsg');
  const succEl = document.getElementById('successMsg');
  const btn = document.getElementById('submitBtn');

  errEl.classList.remove('show'); succEl.classList.remove('show');

  if (!idChecked) {
    errEl.textContent = '아이디 중복확인을 해주세요.';
    errEl.classList.add('show'); return;
  }
  if (password !== passwordConfirm) {
    errEl.textContent = '비밀번호가 일치하지 않습니다.';
    errEl.classList.add('show'); return;
  }
  if (!document.getElementById('agreeTerms').checked || !document.getElementById('agreePrivacy').checked) {
    errEl.textContent = '필수 약관에 동의해주세요.';
    errEl.classList.add('show'); return;
  }

  btn.classList.add('loading'); btn.disabled = true;

  try {
    const db = getSupabase();
    const email = userId + '@bunyangtok.com';

    // 1단계: 회원가입
    const { data: signUpData, error: signUpError } = await db.auth.signUp({
      email, password,
      options: { data: { name, username: userId, nickname } }
    });
    if (signUpError) {
      const m = signUpError.message || '';
      if (m.includes('already registered') || m.includes('already exists')) throw new Error('이미 사용 중인 아이디입니다.');
      throw signUpError;
    }

    // 2단계: 바로 로그인 시도 (이메일 인증 비활성화 시 즉시 성공)
    const { data: signInData, error: signInError } = await db.auth.signInWithPassword({ email, password });

    if (signInData?.session) {
      // profiles 테이블에 username 저장 (있으면)
      try { await db.from('profiles').upsert({ user_id: signInData.user.id, username: userId, name, nickname }); } catch(_) {}
      window.location.href = 'index.html';
    } else {
      // 이메일 인증이 활성화된 경우
      succEl.textContent = '✓ 가입 신청이 완료되었습니다. 잠시 후 로그인해주세요.';
      succEl.classList.add('show');
      btn.classList.remove('loading'); btn.disabled = false;
      setTimeout(() => window.location.href = 'login.html', 2500);
    }
  } catch (err) {
    errEl.textContent = err.message || '가입 중 오류가 발생했습니다.';
    errEl.classList.add('show');
    btn.classList.remove('loading'); btn.disabled = false;
  }
});
</script>
</body>
</html>
