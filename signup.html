<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - 분양톡</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
<div class="topbar">
  <div class="container topbar-inner">
    <div class="topbar-stats">
      <span>👥 오늘 방문 <strong>2,847</strong>명</span>
      <span>📋 신규현장 <strong>93</strong>건</span>
      <span>🏢 전체회원 <strong>312,441</strong>명</span>
    </div>
    <div class="topbar-links">
      <a href="login.html">로그인</a>
      <a href="signup.html" class="btn-join">회원가입</a>
    </div>
  </div>
</div>
<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <img src="assets/logo-icon.svg" alt="분양톡" class="logo-icon" />
      <span class="logo-text">분양<span class="logo-accent">톡</span></span>
    </a>
    <nav class="nav-desktop">
      <a href="index.html" class="nav-link">HOME</a>
      <a href="listings.html" class="nav-link">지역현장</a>
      <a href="map.html" class="nav-link">지도현장</a>
      <a href="supporters.html" class="nav-link">서포터즈</a>
      <a href="register.html" class="nav-link btn-register">+ 현장등록</a>
    </nav>
    <button class="mobile-menu-btn" onclick="document.getElementById('mobileMenu').classList.toggle('open')">☰</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">HOME</a>
    <a href="listings.html">지역현장</a>
    <a href="map.html">지도현장</a>
    <a href="supporters.html">서포터즈</a>
    <a href="register.html">현장등록</a>
    <a href="login.html">로그인</a>
    <a href="signup.html">회원가입</a>
  </div>
</header>

<section style="padding:60px 0;">
  <div class="container">
    <div class="register-form" style="max-width:520px;">
      <div class="form-title">회원가입</div>
      <div class="form-sub">분양톡 회원이 되시면 다양한 혜택을 누리실 수 있습니다. <span class="required">*</span> 필수항목</div>
      <div class="form-group">
        <label class="form-label">이름 <span class="required">*</span></label>
        <input type="text" class="form-input" placeholder="실명을 입력해주세요" />
      </div>
      <div class="form-group">
        <label class="form-label">아이디(이메일) <span class="required">*</span></label>
        <input type="email" class="form-input" placeholder="이메일 주소 입력" />
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 <span class="required">*</span></label>
        <input type="password" class="form-input" placeholder="8자 이상 입력" />
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 확인 <span class="required">*</span></label>
        <input type="password" class="form-input" placeholder="비밀번호 재입력" />
      </div>
      <div class="form-group">
        <label class="form-label">연락처 <span class="required">*</span></label>
        <input type="tel" class="form-input" placeholder="010-0000-0000" />
      </div>
      <div class="form-group">
        <label class="form-label">직군</label>
        <select class="form-select">
          <option value="">선택해주세요</option>
          <option>분양상담사 (팀장)</option>
          <option>분양상담사 (팀원)</option>
          <option>분양상담사 (사이드)</option>
          <option>시행사/대행사</option>
          <option>서포터즈 업체</option>
          <option>기타</option>
        </select>
      </div>
      <div class="form-group">
        <label class="agree-item">
          <input type="checkbox" /> 이용약관에 동의합니다 (<a href="terms.html">보기</a>)
        </label>
      </div>
      <div class="form-group">
        <label class="agree-item">
          <input type="checkbox" /> 개인정보 처리방침에 동의합니다 (<a href="privacy.html">보기</a>)
        </label>
      </div>
      <button class="form-submit" onclick="alert('회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.'); location.href='login.html';">회원가입</button>
      <p style="text-align:center; margin-top:16px; font-size:14px; color:var(--text-sub);">
        이미 회원이신가요? <a href="login.html" style="color:var(--primary); font-weight:700;">로그인</a>
      </p>
    </div>
  </div>
</section>
<footer class="footer">
  <div class="footer-bottom">
    <div class="container">
      <a href="privacy.html">개인정보 처리방침</a>
      <a href="terms.html">이용약관</a>
      <a href="posting-rules.html">게시물 운영규칙</a>
      <span class="footer-copy">© 2026 분양톡. All rights reserved.</span>
    </div>
  </div>
</footer>
</body>
</html>
