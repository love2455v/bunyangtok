<section style="padding:60px 0;">
  <div class="container">
    <div class="register-form">
      <div class="form-title">서포터즈 업체 등록</div>
      <div class="form-sub">전국 30만 분양 종사자에게 내 업체를 알리세요. 현수막·명함·렌탈·대출기관·시행사·대행사 모두 등록 가능합니다.</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">업체명 <span class="required">*</span></label>
          <input type="text" class="form-input" placeholder="업체명 입력" />
        </div>
        <div class="form-group">
          <label class="form-label">업종 <span class="required">*</span></label>
          <select class="form-select">
            <option value="">선택해주세요</option>
            <option>현수막/인쇄</option>
            <option>명함/홍보물</option>
            <option>렌탈업체</option>
            <option>대출기관</option>
            <option>시행사</option>
            <option>대행사</option>
            <option>기타</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">담당자명 <span class="required">*</span></label>
          <input type="text" class="form-input" placeholder="담당자 이름" />
        </div>
        <div class="form-group">
          <label class="form-label">연락처 <span class="required">*</span></label>
          <input type="tel" class="form-input" placeholder="010-0000-0000" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" class="form-input" placeholder="이메일 주소" />
      </div>
      <div class="form-group">
        <label class="form-label">서비스 지역</label>
        <select class="form-select">
          <option value="">전국</option>
          <option>서울/경기</option>
          <option>부산/경남</option>
          <option>대구/경북</option>
          <option>광주/전라</option>
          <option>대전/충청</option>
          <option>강원</option>
          <option>제주</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">업체 소개</label>
        <textarea class="form-textarea" placeholder="업체 소개, 주요 서비스, 특장점 등을 입력해주세요"></textarea>
      </div>
      <button class="form-submit" onclick="alert('서포터즈 등록 신청이 완료되었습니다!
검토 후 24시간 이내 연락드리겠습니다.'); location.href='supporters.html';">서포터즈 등록 신청</button>
    </div>
  </div>
</section>
