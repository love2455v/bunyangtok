<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지도현장 - 분양톡</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=8d686eda8e41e10cb124de30d34614f0&autoload=false"></script>
  <style>
    #kakao-map { width:100%; height:calc(100vh - 170px); min-height:420px; }
    .map-filter { background:#fff; border-bottom:1px solid #f0f0f0; padding:10px 16px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .map-filter select { padding:8px 12px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px; font-family:inherit; }
    .map-count { font-size:13px; color:#64748b; margin-left:auto; }
    .map-dim { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:1000; }
    .map-dim.on { display:block; }
    .map-card {
      display:none; position:fixed; bottom:0; left:0; right:0;
      background:#fff; border-radius:20px 20px 0 0;
      box-shadow:0 -4px 24px rgba(0,0,0,.18);
      padding:24px 20px 36px; z-index:1001;
    }
    .map-card.on { display:block; animation:slideUp .22s ease; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .card-close { position:absolute; top:14px; right:18px; font-size:24px; background:none; border:none; color:#94a3b8; cursor:pointer; }
    .card-name { font-size:17px; font-weight:700; color:#1e1e1e; margin-bottom:6px; padding-right:32px; line-height:1.4; }
    .card-meta { font-size:13px; color:#64748b; margin-bottom:10px; }
    .card-fee { display:inline-block; background:#FF6B2B; color:#fff; font-size:13px; font-weight:700; padding:5px 12px; border-radius:6px; margin-bottom:16px; }
    .card-go { display:block; text-align:center; background:#FF6B2B; color:#fff; padding:15px; border-radius:12px; font-size:16px; font-weight:700; text-decoration:none; }
    .card-go:hover { background:#e55a1f; }
  </style>
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <img src="assets/logo-icon.png" alt="분양톡" class="logo-icon" />
      <span class="logo-text">분양<span class="logo-accent">톡</span></span>
    </a>
    <nav class="nav-desktop">
      <a href="index.html" class="nav-link">HOME</a>
      <a href="listings.html" class="nav-link">지역현장</a>
      <a href="map.html" class="nav-link active">지도현장</a>
      <a href="supporters.html" class="nav-link">서포터즈</a>
      <a href="register.html" class="nav-link btn-register">+ 현장등록</a>
    </nav>
    <button class="mobile-menu-btn" onclick="document.getElementById('mobileMenu').classList.toggle('open')">☰</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">HOME</a>
    <a href="listings.html">지역현장</a>
    <a href="map.html">지도현장</a>
    <a href="supporters.html">서포터즈</a>
    <a href="register.html">현장등록</a>
    <a href="login.html">로그인</a>
    <a href="signup.html">회원가입</a>
  </div>
</header>

<div class="map-filter">
  <select id="regionSel" onchange="filterRegion(this.value)">
    <option value="">전체 지역</option>
    <option value="서울">서울</option>
    <option value="경기">경기</option>
    <option value="인천">인천</option>
    <option value="부산">부산</option>
    <option value="충청">충청</option>
    <option value="대전">대전</option>
  </select>
  <span class="map-count" id="mapCount"></span>
</div>

<div id="kakao-map"></div>

<div class="map-dim" id="dim" onclick="closeCard()"></div>
<div class="map-card" id="mapCard">
  <button class="card-close" onclick="closeCard()">✕</button>
  <div class="card-name" id="cName"></div>
  <div class="card-meta" id="cMeta"></div>
  <div class="card-fee" id="cFee"></div>
  <a href="#" class="card-go" id="cBtn">자세히 보기</a>
</div>

<footer class="footer">
  <div class="footer-bottom">
    <div class="container">
      <a href="privacy.html">개인정보 처리방침</a>
      <a href="terms.html">이용약관</a>
      <a href="posting-rules.html">게시물 운영규칙</a>
      <span class="footer-copy">© 2026 분양톡. All rights reserved.</span>
    </div>
  </div>
</footer>

<script src="script.js"></script>
<script>
// 데모 현장 데이터 (추후 Supabase에서 실제 좌표 받아오기)
const DEMO = [
  { id:1, title:'강동구 고덕동 신규 아파트 팀장/팀원 모집', region:'서울', type:'아파트', role:'팀장/팀원', fee:'팀수수료 1,800만원', lat:37.5496, lng:127.1505 },
  { id:2, title:'인천 송도 신도시 랜드마크 아파트 분양',    region:'인천', type:'아파트', role:'팀원/사이드', fee:'팀수수료 1,200만원', lat:37.3827, lng:126.6565 },
  { id:3, title:'부산 해운대 오션뷰 하이엔드 팀장/팀원 모집', region:'부산', type:'오피스텔', role:'팀장/팀원', fee:'팀수수료 2,000만원', lat:35.1587, lng:129.1603 },
  { id:4, title:'수원 영통구 대형 단지 대행사 직영 모집',    region:'경기', type:'아파트', role:'팀장/팀원/사이드', fee:'협의', lat:37.2753, lng:127.0470 },
  { id:5, title:'천안 신규 아파트 파격 조건 변경',          region:'충청', type:'아파트', role:'팀장/팀원', fee:'팀수수료 1,500만원', lat:36.8151, lng:127.1139 },
  { id:6, title:'경기 광주 2,300세대 대단지 본부장/팀장 모집', region:'경기', type:'아파트', role:'본부장/팀장', fee:'팀수수료 1,800만원', lat:37.4296, lng:127.2555 },
  { id:7, title:'서울 노원구 역세권 오피스텔 팀원 모집',    region:'서울', type:'오피스텔', role:'팀원/사이드', fee:'팀수수료 800만원', lat:37.6559, lng:127.0637 },
  { id:8, title:'대전 세종 신규 아파트 본부장/팀장 모집',   region:'대전', type:'아파트', role:'본부장/팀장', fee:'팀수수료 1,600만원', lat:36.3504, lng:127.3845 },
];

let map, markers = [];

const PIN = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">' +
  '<path d="M14 0C6.27 0 0 6.27 0 14c0 9.8 14 24 14 24S28 23.8 28 14C28 6.27 21.73 0 14 0z" fill="#FF6B2B"/>' +
  '<circle cx="14" cy="14" r="6" fill="white"/>' +
  '</svg>'
);

function initMap() {
  map = new kakao.maps.Map(document.getElementById('kakao-map'), {
    center: new kakao.maps.LatLng(36.5, 127.6),
    level: 8
  });
  addMarkers(DEMO);
  setCount(DEMO.length);
}

function addMarkers(list) {
  markers.forEach(m => m.setMap(null));
  markers = [];
  const img = new kakao.maps.MarkerImage(PIN, new kakao.maps.Size(28, 38), { offset: new kakao.maps.Point(14, 38) });
  list.forEach(item => {
    const m = new kakao.maps.Marker({ position: new kakao.maps.LatLng(item.lat, item.lng), image: img, map });
    kakao.maps.event.addListener(m, 'click', () => openCard(item));
    markers.push(m);
  });
  if (list.length > 0) {
    const b = new kakao.maps.LatLngBounds();
    list.forEach(l => b.extend(new kakao.maps.LatLng(l.lat, l.lng)));
    map.setBounds(b);
  }
}

function openCard(item) {
  document.getElementById('cName').textContent = item.title;
  document.getElementById('cMeta').textContent = item.region + ' · ' + item.type + ' · ' + item.role;
  document.getElementById('cFee').textContent = item.fee;
  document.getElementById('cBtn').href = 'detail.html?id=' + item.id;
  document.getElementById('mapCard').classList.add('on');
  document.getElementById('dim').classList.add('on');
}

function closeCard() {
  document.getElementById('mapCard').classList.remove('on');
  document.getElementById('dim').classList.remove('on');
}

function filterRegion(r) {
  const list = r ? DEMO.filter(l => l.region === r) : DEMO;
  addMarkers(list);
  setCount(list.length);
}

function setCount(n) { document.getElementById('mapCount').textContent = '현장 ' + n + '개'; }

kakao.maps.load(initMap);
</script>
</body>
</html>
