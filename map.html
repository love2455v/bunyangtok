<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지도현장 - 분양톡</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
<div class="topbar">
  <div class="container topbar-inner">
    <div class="topbar-stats">
      <span>👥 오늘 방문 <strong>2,847</strong>명</span>
      <span>📋 신규현장 <strong>5</strong>건</span>
      <span>🏢 전체회원 <strong>128</strong>명</span>
    </div>
    <div class="topbar-links">
      <a href="login.html">로그인</a>
      <a href="signup.html" class="btn-join">회원가입</a>
    </div>
  </div>
</div>
<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <img src="logo-icon.svg" width="38" height="38" alt="" style="border-radius:8px;vertical-align:middle;">
      <span class="logo-text">분양<span class="logo-accent">톡</span></span>
    </a>
    <nav class="nav-desktop">
      <a href="index.html" class="nav-link">HOME</a>
      <a href="listings.html" class="nav-link">지역현장</a>
      <a href="map.html" class="nav-link">지도현장</a>
      <a href="supporters.html" class="nav-link">서포터즈</a>
      <a href="register.html" class="nav-link btn-register">+ 현장등록</a>
    </nav>
    <button class="mobile-menu-btn" onclick="document.getElementById('mobileMenu').classList.toggle('open')">☰</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">HOME</a>
    <a href="listings.html">지역현장</a>
    <a href="map.html">지도현장</a>
    <a href="supporters.html">서포터즈</a>
    <a href="register.html">현장등록</a>
    <a href="login.html">로그인</a>
    <a href="signup.html">회원가입</a>
  </div>
</header>

<section style="padding:40px 0;">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">지도현장</h2>
    </div>
    <div style="background:#fff; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;">
      <div style="padding:20px; background:var(--bg); border-bottom:1px solid var(--border); display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <span style="font-weight:700; font-size:14px; color:var(--charcoal);">지역 선택</span>
        <select style="padding:8px 14px; border:1.5px solid var(--border); border-radius:6px; font-size:14px; font-family:inherit;" onchange="updateMapRegion(this.value)">
          <option value="">전체 지역</option>
          <option value="서울">서울</option>
          <option value="경기남부">경기남부</option>
          <option value="경기북부">경기북부</option>
          <option value="인천">인천</option>
          <option value="부산">부산</option>
          <option value="대구">대구</option>
        </select>
      </div>
      <div style="position:relative; background:#F8F8F8; height:540px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px;">
        <div style="font-size:48px;">🗺️</div>
        <p style="color:var(--text-sub); font-size:15px; text-align:center; line-height:1.8;">지도 기반 현장 검색 기능<br/>순차적으로 오픈 예정입니다</p>
        <a href="listings.html" class="btn-primary" style="display:inline-block; margin-top:8px;">목록으로 현장 보기</a>
      </div>
    </div>
  </div>
</section>
<script>function updateMapRegion(r){ window.location.href='listings.html'+(r?'?region='+r:''); }</script>
<footer class="footer">
  <div class="footer-bottom">
    <div class="container">
      <a href="privacy.html">개인정보 처리방침</a>
      <a href="terms.html">이용약관</a>
      <a href="posting-rules.html">게시물 운영규칙</a>
      <span class="footer-copy">© 2026 분양톡. All rights reserved.</span>
    </div>
  </div>
</footer>
</body>
</html>
