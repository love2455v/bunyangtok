<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지도매물 - 분양톡</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    .map-layout {
      display: flex;
      height: calc(100vh - 108px);
      min-height: 500px;
    }
    .map-sidebar {
      width: 340px;
      min-width: 280px;
      background: #fff;
      border-right: 1.5px solid #eee;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    .sidebar-header h2 {
      font-size: 15px; font-weight: 800; color: var(--charcoal);
      margin: 0 0 10px;
    }
    .region-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .region-chip {
      padding: 4px 10px; border-radius: 16px; border: 1.5px solid #ddd;
      font-size: 11px; cursor: pointer; background: #fff; font-family: inherit;
      transition: all 0.15s;
    }
    .region-chip.active {
      background: var(--orange); color: #fff; border-color: var(--orange);
    }
    .sidebar-count {
      font-size: 12px; color: #999; padding: 6px 14px;
      border-bottom: 1px solid #f0f0f0; flex-shrink: 0;
    }
    .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
    .map-card {
      border: 1.5px solid #eee; border-radius: 10px; padding: 11px 12px;
      margin-bottom: 7px; cursor: pointer; transition: all 0.15s;
    }
    .map-card:hover, .map-card.active {
      border-color: var(--orange); background: #fff9f5;
    }
    .map-card-region {
      font-size: 11px; color: var(--orange); font-weight: 700; margin-bottom: 3px;
    }
    .map-card-title {
      font-size: 13px; font-weight: 700; color: var(--charcoal);
      margin-bottom: 5px; line-height: 1.4;
    }
    .map-card-fee {
      font-size: 13px; font-weight: 800; color: var(--orange); margin-bottom: 3px;
    }
    .map-card-meta { font-size: 11px; color: #aaa; }
    #map-container { flex: 1; }
    /* Leaflet popup */
    .custom-popup .leaflet-popup-content-wrapper {
      border-radius: 12px; padding: 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    }
    .custom-popup .leaflet-popup-content { margin: 14px 16px; }
    .popup-region { font-size: 11px; color: var(--orange); font-weight: 700; margin-bottom: 4px; }
    .popup-title { font-size: 14px; font-weight: 800; color: #222; margin-bottom: 5px; line-height: 1.4; }
    .popup-fee { font-size: 13px; font-weight: 800; color: var(--orange); margin-bottom: 10px; }
    .popup-btn {
      display: inline-block; padding: 6px 14px;
      background: var(--orange); color: #fff;
      border-radius: 6px; font-size: 12px; font-weight: 700; text-decoration: none;
    }
    @media (max-width: 700px) {
      .map-layout { flex-direction: column; height: auto; }
      .map-sidebar {
        width: 100%; min-width: unset;
        height: 220px; border-right: none;
        border-bottom: 1.5px solid #eee;
      }
      .sidebar-list {
        flex-direction: row; display: flex;
        overflow-x: auto; overflow-y: hidden; padding: 8px; gap: 0;
      }
      .map-card { min-width: 210px; margin-right: 7px; margin-bottom: 0; flex-shrink: 0; }
      #map-container { height: 420px; }
    }
  </style>
</head>
<body>
<div class="topbar">
  <div class="container topbar-inner">
    <div class="topbar-stats">
      <span>&#127969; 전국 채용 중 <strong>47</strong>곳</span>
      <span>&#128203; 신규매물 <strong>5</strong>건</span>
      <span>&#128101; 누적가입자 <strong>128</strong>명</span>
    </div>
    <div class="topbar-links">
      <a href="login.html">로그인</a>
      <a href="signup.html" class="btn-join">무료가입</a>
    </div>
  </div>
</div>
<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <img src="logo-icon.svg" width="38" height="38" alt="" style="border-radius:8px;vertical-align:middle;">
      <span class="logo-text">분양<span class="logo-accent">톡</span></span>
    </a>
    <nav class="nav-desktop">
      <a href="index.html" class="nav-link">HOME</a>
      <a href="listings.html" class="nav-link">구인구직매물</a>
      <a href="map.html" class="nav-link active">지도매물</a>
      <a href="supporters.html" class="nav-link">서포터즈</a>
      <a href="register.html" class="nav-link btn-register">+ 매물등록</a>
    </nav>
    <button class="mobile-menu-btn" onclick="document.getElementById('mobileMenu').classList.toggle('open')">&#9776;</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">HOME</a>
    <a href="listings.html">구인구직매물</a>
    <a href="map.html">지도매물</a>
    <a href="supporters.html">서포터즈</a>
    <a href="register.html">매물등록</a>
    <a href="login.html">로그인</a>
    <a href="signup.html">무료가입</a>
  </div>
</header>

<div class="map-layout">
  <div class="map-sidebar">
    <div class="sidebar-header">
      <h2>&#128205; 지도 현장 검색</h2>
      <div class="region-chips" id="regionChips">
        <button class="region-chip active" onclick="filterMap('',this)">전체</button>
        <button class="region-chip" onclick="filterMap('서울',this)">서울</button>
        <button class="region-chip" onclick="filterMap('경기남부',this)">경기남부</button>
        <button class="region-chip" onclick="filterMap('경기북부',this)">경기북부</button>
        <button class="region-chip" onclick="filterMap('인천',this)">인천</button>
        <button class="region-chip" onclick="filterMap('부산',this)">부산</button>
        <button class="region-chip" onclick="filterMap('대구',this)">대구</button>
        <button class="region-chip" onclick="filterMap('대전',this)">대전</button>
        <button class="region-chip" onclick="filterMap('광주',this)">광주</button>
        <button class="region-chip" onclick="filterMap('충청도',this)">충청</button>
        <button class="region-chip" onclick="filterMap('경상도',this)">경상</button>
        <button class="region-chip" onclick="filterMap('전라도',this)">전라</button>
        <button class="region-chip" onclick="filterMap('제주',this)">제주</button>
      </div>
    </div>
    <div class="sidebar-count" id="sidebarCount">현장 불러오는 중...</div>
    <div class="sidebar-list" id="sidebarList">
      <div style="text-align:center;padding:40px;color:#ccc;font-size:13px;">지도 초기화 중...</div>
    </div>
  </div>
  <div id="map-container"></div>
</div>

<footer class="footer">
  <div class="footer-bottom">
    <div class="container">
      <a href="privacy.html">개인정보처리방침</a>
      <a href="terms.html">이용약관</a>
      <a href="posting-rules.html">게시물 이용규칙</a>
      <span class="footer-copy">&#169; 2026 분양톡. All rights reserved.</span>
    </div>
  </div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
<script>
/* ============================
   분양톡 지도 페이지
   ============================ */

const REGION_COORDS = {
  '서울':    [37.5665, 126.9780],
  '경기남부':[37.2636, 127.0286],
  '경기북부':[37.7400, 126.9700],
  '경기':    [37.4138, 127.5183],
  '인천':    [37.4563, 126.7052],
  '부산':    [35.1796, 129.0756],
  '대구':    [35.8714, 128.6014],
  '광주':    [35.1595, 126.8526],
  '대전':    [36.3504, 127.3845],
  '울산':    [35.5384, 129.3114],
  '세종':    [36.4800, 127.2890],
  '충청도':  [36.5500, 127.2000],
  '충북':    [36.6357, 127.4917],
  '충남':    [36.6588, 126.6728],
  '경상도':  [35.7000, 128.8000],
  '경북':    [36.4919, 128.8889],
  '경남':    [35.4606, 128.2132],
  '전라도':  [35.4000, 127.1000],
  '전북':    [35.7175, 127.1530],
  '전남':    [34.8679, 126.9910],
  '강원':    [37.8228, 128.1555],
  '제주':    [33.4996, 126.5312],
};
const DEFAULT_COORD = [36.5, 127.5];

function getCoord(listing) {
  const base = REGION_COORDS[listing.region] || DEFAULT_COORD;
  const seed = listing.id || Math.floor(Math.random() * 10000);
  const dlat = ((seed * 17) % 100 - 50) / 1500;
  const dlng = ((seed * 31) % 100 - 50) / 1200;
  return [base[0] + dlat, base[1] + dlng];
}

// ===== Leaflet 지도 초기화 =====
const map = L.map('map-container', { zoomControl: true }).setView([36.5, 127.5], 7);

// 한국어 OpenStreetMap 타일
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&#169; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 18
}).addTo(map);

// 커스텀 오렌지 마커
const orangeIcon = L.divIcon({
  className: '',
  html: '<div style="width:14px;height:14px;background:#ff6b2b;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(255,107,43,0.5);"></div>',
  iconSize: [14, 14],
  iconAnchor: [7, 7],
  popupAnchor: [0, -12]
});
const activeIcon = L.divIcon({
  className: '',
  html: '<div style="width:18px;height:18px;background:#ff6b2b;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 12px rgba(255,107,43,0.7);"></div>',
  iconSize: [18, 18],
  iconAnchor: [9, 9],
  popupAnchor: [0, -14]
});

let allListings = [];
let visibleMarkers = [];
let activeIdx = null;

// ===== 마커 배치 =====
function placeMarkers(listings) {
  visibleMarkers.forEach(m => map.removeLayer(m.marker));
  visibleMarkers = [];

  listings.forEach((listing, i) => {
    const coord = getCoord(listing);
    const marker = L.marker(coord, { icon: orangeIcon }).addTo(map);

    const fee = listing.fee || '협의';
    const roles = Array.isArray(listing.role) ? listing.role.join('/') : (listing.role || '');
    const popupHtml =
      '<div>' +
        '<div class="popup-region">&#128205; ' + (listing.region || '') + '</div>' +
        '<div class="popup-title">' + listing.title + '</div>' +
        '<div class="popup-fee">팀수수료 ' + fee + '</div>' +
        '<a href="detail.html?id=' + listing.id + '" class="popup-btn">상세보기 →</a>' +
      '</div>';

    marker.bindPopup(popupHtml, { className: 'custom-popup', maxWidth: 240 });
    marker.on('click', function() {
      setActiveMarker(i);
      scrollToCard(i);
    });

    visibleMarkers.push({ marker, listing, index: i });
  });
}

function setActiveMarker(i) {
  if (activeIdx !== null && visibleMarkers[activeIdx]) {
    visibleMarkers[activeIdx].marker.setIcon(orangeIcon);
  }
  activeIdx = i;
  if (visibleMarkers[i]) {
    visibleMarkers[i].marker.setIcon(activeIcon);
  }
}

// ===== 사이드바 카드 렌더링 =====
function renderSidebar(listings) {
  const countEl = document.getElementById('sidebarCount');
  const listEl = document.getElementById('sidebarList');
  if (countEl) countEl.textContent = '현장 ' + listings.length + '개';
  if (!listEl) return;
  if (!listings.length) {
    listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#ccc;font-size:13px;">현장이 없습니다</div>';
    return;
  }
  listEl.innerHTML = listings.map(function(l, i) {
    var roles = Array.isArray(l.role) ? l.role.join('/') : (l.role || '');
    return '<div class="map-card" id="mcard-' + i + '" onclick="focusMarker(' + i + ')">' +
      '<div class="map-card-region">&#128205; ' + (l.region || '') + '</div>' +
      '<div class="map-card-title">' + l.title + '</div>' +
      '<div class="map-card-fee">팀수수료 ' + (l.fee || '협의') + '</div>' +
      '<div class="map-card-meta">' + (l.company || '') + (roles ? ' · ' + roles : '') + '</div>' +
      '</div>';
  }).join('');
}

function scrollToCard(i) {
  document.querySelectorAll('.map-card').forEach(function(c) { c.classList.remove('active'); });
  var card = document.getElementById('mcard-' + i);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function focusMarker(i) {
  var item = visibleMarkers[i];
  if (!item) return;
  setActiveMarker(i);
  scrollToCard(i);
  map.setView(item.marker.getLatLng(), 13, { animate: true });
  setTimeout(function() { item.marker.openPopup(); }, 350);
}

// ===== 지역 필터 =====
function filterMap(region, btn) {
  document.querySelectorAll('.region-chip').forEach(function(c) { c.classList.remove('active'); });
  btn.classList.add('active');
  activeIdx = null;

  var filtered = region
    ? allListings.filter(function(l) { return l.region && l.region.includes(region.replace('도','').replace('부','').replace('남','').replace('북','')); })
    : allListings;

  // 충청/경상/전라는 좀더 넓게 매칭
  if (region === '충청도') filtered = allListings.filter(function(l){ return l.region && (l.region.includes('충') || l.region === '충청도'); });
  if (region === '경상도') filtered = allListings.filter(function(l){ return l.region && (l.region.includes('경상') || l.region === '경남' || l.region === '경북' || l.region === '부산' || l.region === '대구' || l.region === '울산'); });
  if (region === '전라도') filtered = allListings.filter(function(l){ return l.region && (l.region.includes('전') || l.region === '광주'); });
  if (region === '') filtered = allListings;

  placeMarkers(filtered);
  renderSidebar(filtered);

  if (region && REGION_COORDS[region]) {
    map.setView(REGION_COORDS[region], 9, { animate: true });
  } else {
    map.setView([36.5, 127.5], 7, { animate: true });
  }
}

// ===== Supabase 전체 로드 =====
async function initMap() {
  try {
    var db = getSupabase();
    if (db) {
      var result = await db.from('listings').select('*').eq('is_active', true).order('created_at', { ascending: false });
      if (!result.error && result.data && result.data.length) {
        allListings = result.data;
      }
    }
  } catch(e) {}

  if (!allListings.length && typeof LISTINGS_FALLBACK !== 'undefined') {
    allListings = LISTINGS_FALLBACK;
  }

  placeMarkers(allListings);
  renderSidebar(allListings);
}

document.addEventListener('DOMContentLoaded', function() {
  // map.html은 script.js DOMContentLoaded와 공존 — 지도 초기화만
  setTimeout(function() {
    map.invalidateSize();
    initMap();
  }, 100);
});
</script>
</body>
</html>
