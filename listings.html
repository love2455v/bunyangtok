<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="style.css?v=2" />
  <style>
    /* ===== 카드 이미지 슬라이더 ===== */
    .card-slider {
      position: relative; width: 100%; height: 200px;
      overflow: hidden; background: #1E293B; border-radius: 10px 10px 0 0;
    }
    .sl-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .sl-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.45); color: #fff; border: none;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 22px; line-height: 30px; text-align: center;
      cursor: pointer; z-index: 10; padding: 0; transition: background 0.2s;
    }
    .sl-btn:hover { background: rgba(0,0,0,0.7); }
    .sl-prev { left: 8px; }
    .sl-next { right: 8px; }
    .sl-dots {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; z-index: 10;
    }
    .sl-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.5); cursor: pointer; transition: background 0.2s;
    }
    .sl-dot.active { background: #fff; }
    .sl-counter {
      position: absolute; top: 8px; right: 10px;
      background: rgba(0,0,0,0.5); color: #fff;
      font-size: 11px; padding: 2px 8px; border-radius: 10px; z-index: 10;
    }
    .card-img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px 10px 0 0; display: block; }
  </style>
</head>

      <button class="region-tab" onclick="filterRegion(this,'부산')">부산</button>
      <button class="region-tab" onclick="filterRegion(this,'울산')">울산</button>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="container">
    <div class="filter-inner">
      <select class="filter-select" id="typeFilter" onchange="applyFilters()">
        <option value="">업종 전체</option>
        <option value="아파트">아파트</option>
        <option value="오피스텔">오피스텔</option>
        <option value="상가">상가</option>
        <option value="도시형생활주택">도시형생활주택</option>
        <option value="타운하우스">타운하우스</option>
      </select>
      <select class="filter-select" id="roleFilter" onchange="applyFilters()">
        <option value="">직종 전체</option>
        <option value="본부장">본부장</option>
        <option value="팀장">팀장</option>
        <option value="팀원">팀원</option>
        <option value="사이드">사이드</option>
        <option value="각개">각개</option>
      </select>
      <select class="filter-select" id="payFilter" onchange="applyFilters()">
        <option value="">급여 전체</option>
        <option value="계약수수료">계약수수료</option>
        <option value="기본급+인센">기본급+인센</option>
      </select>
      <select class="filter-select" id="sortFilter" onchange="applyFilters()">

        <option value="best">인기순</option>
        <option value="fee">수수료순</option>
      </select>
      <button class="filter-reset" onclick="resetFilters()">✕ 초기화</button>
      <span class="filter-count" id="filterCount">불러오는 중...</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
<script>
  // ===== URL 파라미터 처리 =====
  (function() {
    var p = new URLSearchParams(location.search);
    var q = p.get('q'), r = p.get('region');
    if (q) {
      currentKeyword = q;
      var ei = document.getElementById('searchInput');
      if (ei) ei.value = q;
    }
    if (r) {
      currentRegion = r;
      var rs = document.getElementById('regionSelect');
      if (rs) rs.value = r;
      // 탭 활성화
      document.querySelectorAll('.region-tab').forEach(function(t) {
        t.classList.toggle('active', t.textContent === r);
      });
    }
  })();

  // ===== 검색창 엔터키 =====
  (function() {
    var si = document.getElementById('searchInput');
    if (si) {
      si.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
      });
    }
  })();

  // ===== 헤더 내 검색 doSearch 오버라이드 (페이지 이동 대신 클라이언트 필터) =====
  function doSearch() {
    var kw = (document.getElementById('searchInput') || {}).value || '';
    var r = (document.getElementById('regionSelect') || {}).value || '';
    currentKeyword = kw.trim();
    currentRegion = r || '전체';
    applyFilters();
  }

  // ===== 지역 탭 필터 =====
  function filterRegion(el, region) {
    document.querySelectorAll('.region-tab').forEach(function(t) { t.classList.remove('active'); });
    el.classList.add('active');
    currentRegion = region;
    applyFilters();
  }

  // ===== 통합 필터 (keyword + region + type + role + pay) =====
  function applyFilters() {
    var type = (document.getElementById('typeFilter') || {}).value || '';
    var role = (document.getElementById('roleFilter') || {}).value || '';
    var pay  = (document.getElementById('payFilter')  || {}).value || '';
    var kw   = currentKeyword ? currentKeyword.toLowerCase() : '';
    var region = (currentRegion && currentRegion !== '전체') ? currentRegion : '';

    var data = (window._cachedData || []).filter(function(l) {
      if (region && l.region !== region) return false;
      if (type && l.type !== type) return false;
      var lRole = Array.isArray(l.role) ? l.role : [];
      if (role && !lRole.includes(role)) return false;
      if (pay && l.pay !== pay) return false;
      if (kw && !(
        (l.title || '').toLowerCase().includes(kw) ||
        (l.description || '').toLowerCase().includes(kw) ||
        (l.company || '').toLowerCase().includes(kw) ||
        (l.region || '').toLowerCase().includes(kw)
      )) return false;
      return true;
    });

    var fc = document.getElementById('filterCount');
    if (fc) fc.textContent = '전체 ' + data.length + '개 현장';
    renderListings(data);
  }

  // ===== 필터 초기화 =====
  function resetFilters() {
    ['typeFilter','roleFilter','payFilter'].forEach(function(id) {
      var e = document.getElementById(id); if (e) e.value = '';
    });
    currentRegion = '전체';
    currentKeyword = '';
    var si = document.getElementById('searchInput'); if (si) si.value = '';
    var rs = document.getElementById('regionSelect'); if (rs) rs.value = '';
    document.querySelectorAll('.region-tab').forEach(function(t) { t.classList.remove('active'); });
    var first = document.querySelector('.region-tab'); if (first) first.classList.add('active');
    applyFilters();
  }

  // ===== Supabase topbar 통계 업데이트 =====
  (function() {
    var db = getSupabase();
    if (!db) return;
    var today = new Date().toISOString().split('T')[0];
    db.from('listings').select('id', {count:'exact', head:true}).eq('is_active', true).then(function(r) {
      var el = document.getElementById('topbarTotal');
      if (el) el.textContent = r.count || 0;
    });
    db.from('listings').select('id', {count:'exact', head:true}).eq('is_active', true).gte('created_at', today).then(function(r) {
      var el = document.getElementById('topbarNewSite');
      if (el) el.textContent = r.count || 0;
    });
  })();
</script>
</body>
