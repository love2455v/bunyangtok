<script src="script.js"></script>
<script>
  let currentRegion = '전체';
  let allData = [...LISTINGS];

  function filterRegion(el, region) {
    document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentRegion = region;
    applyFilters();
  }

  function applyFilters() {
    const type = document.getElementById('typeFilter').value;
    const role = document.getElementById('roleFilter').value;
    const pay  = document.getElementById('payFilter').value;
    let data = currentRegion === '전체' ? [...LISTINGS] : LISTINGS.filter(l => l.region === currentRegion);
    if (type) data = data.filter(l => l.type === type);
    if (role) data = data.filter(l => l.role.includes(role));
    if (pay)  data = data.filter(l => l.pay === pay);
    document.getElementById('filterCount').textContent = `전체 ${data.length}개 현장`;
    renderListings(data);
  }

  function resetFilters() {
    document.getElementById('typeFilter').value = '';
    document.getElementById('roleFilter').value = '';
    document.getElementById('payFilter').value  = '';
    currentRegion = '전체';
    document.querySelectorAll('.region-tab').forEach((t,i) => t.classList.toggle('active', i===0));
    applyFilters();
  }

  // URL 파라미터 처리
  const params = new URLSearchParams(location.search);
  const q = params.get('q');
  const r = params.get('region');
  if (q) document.getElementById('searchInput').value = q;
  if (r) document.getElementById('regionSelect').value = r;

  document.addEventListener('DOMContentLoaded', () => {
    let data = [...LISTINGS];
    if (q) data = data.filter(l => l.title.toLowerCase().includes(q.toLowerCase()) || l.desc.toLowerCase().includes(q.toLowerCase()));
    if (r) { data = data.filter(l => l.region === r); currentRegion = r; }
    document.getElementById('filterCount').textContent = `전체 ${data.length}개 현장`;
    renderListings(data);
  });
</script>
