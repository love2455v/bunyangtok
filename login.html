<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 분양톡</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🏗️ 분양<span>톡</span></div>
    <div class="auth-title">로그인</div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" id="email" class="form-input" placeholder="이메일 주소 입력" required />
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" id="password" class="form-input" placeholder="비밀번호 입력" required />
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; font-size:13px;">
        <label style="display:flex; align-items:center; gap:6px; color:#64748B; cursor:pointer;">
          <input type="checkbox" /> 로그인 상태 유지
        </label>
        <a href="#" style="color:#FF6B2B;">비밀번호 찾기</a>
      </div>
      <button type="submit" id="submitBtn" class="form-submit" style="margin-top:0;">로그인</button>
    </form>

    <div style="text-align:center; margin:20px 0; color:#94A3B8; font-size:12px; position:relative;">
      <span style="background:#fff; padding:0 12px; position:relative; z-index:1;">또는 SNS 로그인</span>
      <div style="position:absolute; top:50%; left:0; right:0; height:1px; background:#E2E8F0;"></div>
    </div>

    <button class="social-btn" style="background:#FEE500; border-color:#FEE500; color:#000;" onclick="alert('카카오 로그인 준비 중입니다.')">
      💬 카카오로 로그인
    </button>
    <button class="social-btn" style="background:#03C75A; border-color:#03C75A; color:#fff;" onclick="alert('네이버 로그인 준비 중입니다.')">
      N 네이버로 로그인
    </button>

    <div class="auth-switch">
      아직 회원이 아니신가요? <a href="signup.html">회원가입</a>
    </div>
    <div style="text-align:center; margin-top:16px;">
      <a href="index.html" style="font-size:13px; color:#94A3B8;">← 메인으로 돌아가기</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
