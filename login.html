<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 분양톡</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🏗️ 분양<span>톡</span></div>
    <div class="auth-title">로그인</div>

    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label class="form-label">이메일 / 아이디</label>
        <input type="text" class="form-input" placeholder="이메일 또는 아이디 입력" required />
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" class="form-input" placeholder="비밀번호 입력" required />
      </div>
      <div class="auth-options">
        <label class="auth-remember">
          <input type="checkbox" /> 로그인 상태 유지
        </label>
        <a href="#" class="auth-forgot">비밀번호 찾기</a>
      </div>
      <button type="submit" class="form-submit" style="margin-top:0;">로그인</button>
    </form>

    <div class="auth-divider"><span>또는 SNS 로그인</span></div>

    <button class="social-btn" style="background:#FEE500; border-color:#FEE500; color:#000;">
      💬 카카오로 로그인
    </button>
    <button class="social-btn" style="background:#03C75A; border-color:#03C75A; color:#fff;">
      N 네이버로 로그인
    </button>

    <div class="auth-switch">
      아직 회원이 아니신가요? <a href="signup.html">회원가입</a>
    </div>
    <div style="text-align:center; margin-top:16px;">
      <a href="index.html" style="font-size:13px; color:#94A3B8;">← 메인으로 돌아가기</a>
    </div>
  </div>
</div>
<script>
function doLogin(e) {
  e.preventDefault();
  alert('✅ 로그인되었습니다!');
  location.href = 'index.html';
}
</script>
</body>
</html>
